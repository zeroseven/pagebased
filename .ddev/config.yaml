name: pagebased
type: typo3
docroot: .build/public
php_version: "8.3"
webserver_type: nginx-fpm
router_http_port: "80"
router_https_port: "443"
xdebug_enabled: false
additional_hostnames: []
additional_fqdns: []
database:
  type: mariadb
  version: "10.11"
nodejs_version: "20"
webimage_extra_packages: [php-pcov]
use_dns_when_possible: true
composer_version: "2"
web_environment:
  - TYPO3_CONTEXT=Development/DDEV
  - TYPO3_PATH_APP=/var/www/html/.build
  - typo3DatabaseHost=db
  - typo3DatabaseUsername=root
  - typo3DatabasePassword=root
  - typo3DatabaseName=db
corepack_enable: false
hooks:
  post-start:
    - exec: |
        if [ -d "/var/www/html/config" ] && [ ! -L "/var/www/html/config" ]; then
          rm -rf /var/www/html/.build/config
          mv /var/www/html/config /var/www/html/.build/config
        fi
        if [ -d "/var/www/html/var" ] && [ ! -L "/var/www/html/var" ]; then
          rm -rf /var/www/html/.build/var
          mv /var/www/html/var /var/www/html/.build/var
        fi
    - composer: install
